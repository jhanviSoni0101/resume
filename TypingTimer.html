<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #9b59b6, #f1c40f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: linear-gradient(135deg, rgba(241, 196, 15, 0.8), rgba(142, 68, 173, 0.8));
            padding: 20px;
            width: 90%;
            max-width: 600px;
            min-height: 300px;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #my-text {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            border: 1px solid rgb(85, 50, 85);
            font-size: 16px;
        }

        .info {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .info-box {
            flex: 1;
            min-width: 100px;
            background: rgba(255, 255, 255, 0.511);
            color: #8e44ad;
            border-radius: 10px;
            text-align: center;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .info-box:hover {
            background-color: #8e44ad;
            color: #f1c40f;
        }
    </style>
</head>

<body>
    <div class="container">
        <h3>Typing Meter</h3>
        <textarea id="my-text" rows="6" placeholder="write something.."></textarea>
        <div class="info">
            <div class="info-box">
                <h5 id="words">0</h5>
                <p>WORDS</p>
            </div>
            <div class="info-box">
                <h5 id="charecter-with-space">0</h5>
                <p>CHARECTER<br />(WITH SPACE)</p>
            </div>
            <div class="info-box">
                <h5 id="charecter-without-space">0</h5>
                <p>CHARECTER<br />(WITHOUT SPACE)</p>
            </div>
            <div class="info-box">
                <h5 id="special-charecter">0</h5>
                <p>SPECIAL CHARECTERS</p>
            </div>
            <div class="info-box">
                <h5 id="read-time">0</h5>
                <p>READ TIME</p>
            </div>
        </div>
    </div>
</body>
<script>
    let myText = document.getElementById('my-text');
    let words = document.getElementById('words');
    let charwithspace = document.getElementById('charecter-with-space');
    let charwithoutspace = document.getElementById('charecter-without-space');
    let specialchar = document.getElementById('special-charecter');
    let readtime = document.getElementById('read-time');
    function countWord(text) {
        let space = 0;
        let trimmedText = text.trim();
        for (let i = 0; i < trimmedText.length; i++) {
            if ((trimmedText.charCodeAt(i) == 10) || (trimmedText.charCodeAt(i) == 32)
                && (trimmedText.charCodeAt(i + 1) != 10 && trimmedText.charCodeAt(i + 1) != 32)) {
                space++;
            }
        }
        return space;
    }
    function charecterWithSpace(text) {
        return text.trim().length;
    }
    function charecterwithoutspace(text) {
        let space = 0;
        let trimmedText = text.trim();
        for (let i = 0; i < trimmedText.length; i++) {
            if (trimmedText.charCodeAt(i) == 10 || trimmedText.charCodeAt(i) == 32) space++;
        }
        return text.trim().length - space;
    }
    myText.addEventListener('input', function () {
        words.innerHTML = countWord(this.value) + 1;
        charwithspace.innerHTML = charecterWithSpace(this.value);
        charwithoutspace.innerHTML = charecterwithoutspace(this.value);
        readtime.innerHTML = Math.ceil(countWord(this.value) / 120) + "min";
    })
</script>

</html>
