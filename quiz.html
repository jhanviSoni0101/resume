<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .quiz-container>div {
            background: wheat;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .row>div {
            margin-bottom: 8px;
            cursor: pointer;
        }

        button {
            margin-top: 1px;
            border: none;
            border-radius: 10px;
        }
        span{
            display: block;
            margin-top: 5px;
            color: rgb(94, 93, 91);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="mt-5 text-center">QUIZ</h1>
        <div class="quiz-container"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
<script>
    let quizContainer = document.querySelector('.quiz-container');
    function shuffle(array) {
        let currentIndex = array.length;
        while (currentIndex != 0) {
            let randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }
    fetch('https://opentdb.com/api.php?amount=10&type=multiple')
        .then(resp => resp.json())
        .then(data => {
            data.results.forEach((que, index) => {
                que.incorrect_answers.push(que.correct_answer);
                let randomAns = shuffle(que.incorrect_answers)
                quizContainer.innerHTML += `<div class="mb-4">
                <h5><span class="text-primary">${index + 1}</span>${que.question}</h5>
                <div class="row">
                    <div class="col-12">
                       <input type="radio" name="q${index + 1}" value="${randomAns[0]}"/>
                       ${randomAns[0]}
                        </div>
                         <div class="col-12">
                       <input type="radio" name="q${index + 1}" value="${randomAns[1]}"/>
                       ${randomAns[1]}
                        </div>
                         <div class="col-12">
                       <input type="radio" name="q${index + 1}" value="${randomAns[2]}"/>
                       ${randomAns[2]}
                        </div>
                         <div class="col-12">
                       <input type="radio" name="q${index + 1}" value="${randomAns[3]}"/>
                       ${randomAns[3]}
                        </div>
                    </div>
                    <button>SUBMIT</button>
                    <span></span>
                </div>`
            });
            quizContainer.querySelectorAll('button').forEach(function (btn, index) {
                btn.addEventListener('click', function () {
                    let o = this.previousElementSibling.querySelectorAll('input');
                    if (!(o[0].checked || o[1].checked || o[2].checked || o[3].checked)) {
                        this.nextElementSibling.innerHTML = "please choose option";
                    } else {
                        let sel_ans;
                        o.forEach(function (op) {
                            if (op.checked) {
                                sel_ans = op.value;
                                return;
                            }
                        });
                        if (sel_ans == data.results[index].correct_answer) {
                            this.nextElementSibling.innerHTML = "Correct";
                        }
                        else {
                            this.nextElementSibling.innerHTML = "InCorrect";
                        }
                    }
                });
            });
        });
</script>

</html>
