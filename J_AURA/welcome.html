<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .alert {
            height: 100px;
            width: 200px;
            position: absolute;
            top: 20px;
            right: 20px;
            border: 1px solid black;
            background: white;
            border-radius: 20px;
            padding: 20px;
            font-family: system-ui;
            animation-name: animate;
            animation-duration: .3s;
            animation-timing-function: ease-in-out;
        }

        @keyframes animate {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close {
            float: right;
            height: 28px;
            width: 28px;
            background-color: #a764ef;
            color: white;
            border-radius: 50px;
            text-align: center;
            cursor: pointer;
            display: block;
        }

        .close:hover {
            background: #d6b8ff;
            color: #a764ef;
        }

        .text {
            margin-top: 50px;
            font-size: 18px;
            color: #6c3fb8;
            text-align: center;
            font-weight: 600;
        }

        body {
            font-family: system-ui;
            background-color: #dfc9f7;
            color: #3d2868;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-top: 30px;
            font-size: 2.5rem;
            text-align: center;
        }

        p {
            font-size: 18px;
            color: #5B3E96;
            font-weight: 500;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        select,
        button {
            padding: 10px 20px;
            margin: 10px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        select option:hover {
            background-color: white;
            color: #5B3E96;
        }

        select {
            background-color: #C9B6F2;
            color: #5B3E96;
        }

        button {
            background-color: #C9B6F2;
            color: #5B3E96;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background-color: #A78CF1;
            color: white;
        }

        .circle {
            margin-top: 50px;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle at center, #C9B6F2, #A78CF1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #5B3E96;
            text-align: center;
        }

        .timer {
            margin-top: 20px;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div id="alert" class="alert">
        <span class="close" onclick="_close()">x</span>
        <p class="text">Welcome Back💜</p>
    </div>

    <h1>J_Aura</h1>
    <p>Take a deep breadth & relax 💜</p>
    <div class="controls">
        <select id="technique">
            <option value="Deep">Deep Breathing</option>
            <option value="Box">Box Breathing</option>
            <option value="478">4-7-8 Breathing</option>
        </select>

        <select id="level">
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
        </select>

        <button id="stop">Stop</button>
        <!-- <button id="toggleTheme">Toggle Theme</button> -->
    </div>
    <div class="circle">
        <div id="action">Inhale</div>
        <div id="count">0</div>
    </div>
    <div class="timer">Session:0:00</div>
</body>
<script>
    let _alert = document.getElementById('alert');
    let action = document.getElementById('action');
    let timer = document.querySelector('.timer');
    let count = document.getElementById('count');
    let Stopbtn = document.getElementById('stop');
    let Technique = document.getElementById('technique');
    let level = document.getElementById('level');
    let Action = "Inhale";
    let Count = 1;
    let music =new Audio('music.mp3');
    music.loop=true;
    function _close() {
        _alert.style.display = "none";
    }

    let interval = null;
    let session = 0;
    function start() {
        interval = setInterval(() => {

            count.innerText = Count;
            action.innerText = Action;
            session++;
            let min = Math.floor(session / 60);
            let sec = session % 60;
            if (sec < 10) {
                timer.innerHTML = "Session:" + min + ":0" + sec;
            } else {
                timer.innerHTML = "Session:" + min + ":" + sec;
            }
            if (Technique.value == "Deep") {
                if (Action == "Inhale" && Count > 3) {
                    Action = "Exhale";
                    Count = 0;
                }
                else if (Action == "Exhale" && Count > 3) {
                    Action = "Inhale";
                    Count = 0;
                }
            }
            if (Technique.value == "Box") {
                if (Action == "Inhale" && Count > 3) {
                    Action = "Hold";
                    Count = 0;
                }
                else if (Action == "Hold" && Count > 3) {
                    Action = "Exhale";
                    Count = 0;
                }
                else if (Action == "Exhale" && Count > 3) {
                    Action = "Inhale";
                    Count = 0;
                }
            }
            if (Technique.value == "478") {
                if (Action == "Inhale" && Count > 3) {
                    Action = "Hold";
                    Count = 0;
                }
                else if (Action == "Hold" && Count > 6) {
                    Action = "Exhale";
                    Count = 0;
                }
                else if (Action == "Exhale" && Count > 7) {
                    Action = "Inhale";
                    Count = 0;
                }
            }
            Count++;

        }, 1000);
    }
    start();

    Stopbtn.addEventListener('click', () => {
        if (interval) {
            clearInterval(interval);
            interval = null;
            Stopbtn.innerText = "Start";
            music.pause();
        }
        else {
            start();
            Stopbtn.innerText = "Stop";
              music.play();
        }
    });
    level.addEventListener('change',function(){
        if(level.value=="intermediate"){
            window.location.href='intermediate.html';
        }
    });
   
</script>

</html>
