<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            box-sizing: border-box;
        }

        body {
            background-image: url(backgorund.avif);
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 60%;
            height: 80vh;
            background-color: white;
            display: flex;
            border-radius: 10px;
        }

        .left {
            width: 50%;
            padding: 40px;
            display: flex;
            justify-content: center;
            flex-direction: column;
        }

        .left h3 {
            margin: 20px 0px 0px 0px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .left p {
            color: grey;
            font-size: 10px;
            text-align: center;
            margin: 0px 0px 10px 0px;
        }

        .left input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #c7b8ec;
            background: #fff;
        }

        .forget {
            width: 100%;
            text-align: left;
            margin: 5px 0;
        }

        .forget a {
            color: #7c59d9;
            text-decoration: none;
            font-size: 14px;
        }

        .forget a:hover {
            text-decoration: underline;
        }

        .login {
            width: 100%;
            padding: 10px;
            background: #ba8df5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .login:hover {
            background-color: #7c59d9;
        }

        .or {
            text-align: center;
            color: #6f5aa8;
            margin-bottom: 15px;
        }

        .social {
            display: flex;
            justify-content: space-evenly;
            margin-bottom: 50px;
        }
        .social a{
            text-align: center;
            text-decoration: none;
            color: #6f5aa8;;
        }

        .google,
        .facebook {
            width: 45%;
            padding: 7px;
            border: 1px solid black;
            cursor: pointer;
            font-weight: 500;
            background-color: white;
        }

        .text {
            text-align: center;
            font-size: 16px;

        }

        .text a {
            color: #7c59d9;
            text-decoration: none;
            font-weight: 600;

        }

        .right {
            width: 50%;

            background-size: contain;
            background-position: center;
        }

        .right img {
            width: 100%;
            height: 80vh;
        }
        .error-msg{
            color: red !important;
            text-align: left !important;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <form class="left" action="welcome.html" onsubmit="return login()">
            <h3>LOG IN</h3>
            <p>💜 Welcome Back J_Aura 💜</p>
            <input type="email" placeholder="enter  email" id="email" >
            <p class="error-msg" id="erroremail">*please enter email</p>
            <input type="password" placeholder="enter password" id="password">
            <p class="error-msg" id="errorpass">*please enter password</p>
            <p class="forget"><a href="#">forget password?</a></p>
            <button class="login">Log in</button>
            <p class="or">— or Continue With —</p>
            <div class="social">
                <a href="https://www.google.com" class="google">Google</a>
                <a href="https://www.facebook.com" class="facebook">Facebook</a>
            </div>
            <p class="text">Don't have any account? <a href="#">Sign up</a></p>
        </form>
        <div class="right">
            <img src="meditatef.avif" alt="">
        </div>
    </div>
</body>
<script>
    let email = document.getElementById('email');
    let password = document.getElementById('password');

    let erroremail = document.getElementById('erroremail');
    let errorpass = document.getElementById('errorpass');
    
    function login() {
    if(email.value.length==0)
    {
         erroremail.style.display="block";
        return false;

    }
    else if(password.value.length==0)
    {
        errorpass.style.display="block";
        erroremail.style.display="none";
        return false;
    }

    }


</script>

</html>
