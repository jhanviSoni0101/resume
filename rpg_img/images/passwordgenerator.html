<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(50, 2, 67);
            color: rgb(222, 222, 76);
        }

        .container {
            margin: 12%;
            width: 90%;
            max-width: 700px;
        }

        .display {
            width: 100%;
            margin-top: 50px;
            margin-bottom: 30px;
            background: lightyellow;
            color: purple;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 26px 20px;
            border-radius: 10px;
        }

        .container>h1 {
            font-weight: 500;
            font-size: 45px;
        }

        .container>h1>span {
            color: yellow;
            border-bottom: 4px solid yellow;
            padding-bottom: 5px;
        }

        .display>img {
            width: 30px;
            cursor: pointer;
        }

        .display>input {
            border: none;
            outline: none;
            font-size: 24px;
        }

        .container>button>img {
            width: 28px;
            margin-right: 10px;
        }

        .container>button {
            border: none;
            outline: none;
            background-color: rgb(231, 231, 71);
            color: rgb(92, 12, 121);
            font-size: 23px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Generate a<br><span>Random Password</span></h1>
        <div class="display">
            <input type="text" id="password" placeholder="Password">
            <img src="copy.png" alt="">
        </div>
        <button onclick="createPassword()"><img src="generate.png" alt=""> Generate Password</button>
    </div>
</body>
<script>
    let _password = document.getElementById('password');
    let length = 8;
    let uppercase = "ABCDEFGHIJKLMONPQRSTUVWXYZ";
    let lowercase = "abcdefghijklmnopqrstuvwxyz";
    let number = "0123456789";
    let symbol = "{}[]@#$%^&*()?/><+-_=~";
    let allchars = uppercase + lowercase + number + symbol;
    function createPassword() {
        let password = "";
        password += uppercase[Math.floor(Math.random() * uppercase.length)];
        password += lowercase[Math.floor(Math.random() * lowercase.length)];
        password += number[Math.floor(Math.random() * number.length)];
        password += symbol[Math.floor(Math.random() * symbol.length)];
        while (length > password.length) {
            password += allchars[Math.floor(Math.random() * allchars.length)];
        }
        _password.value = password;
    }
</script>

</html>
