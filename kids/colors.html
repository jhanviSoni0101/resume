<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: cursive;
        }

        body {
            background: linear-gradient(45deg, #ffe0b2, #fff9c4);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

        .container>h2 {
            font-size: 40px;
            color: #ff5722;
            margin-bottom: 10px;
        }

        .boxes {
            display: flex;
            flex-wrap: wrap;
            width: 400px;
            margin: auto;
            margin-top: 30px;
            gap: 15px;
            justify-content: center;
        }

        .box {
            width: 100px;
            height: 100px;
            line-height: 100px;
            text-align: center;
            font-size: 2rem;
            /* outline: 1px solid black; */
            outline-offset: -10px;
            cursor: pointer;
            border-radius:50%;
            background: #fff;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
            font-weight: bold;
        }

        .box:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        .goback {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background: #ff7043;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .goback:hover {
            background: #ff5722;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🎨 Fun colors!</h2>
        <div class="boxes"> </div>
        <a href="home.html" class="goback">Go-Back</a>
    </div>
</body>
<script>
    let b = document.querySelector('.boxes');
    let colors = ["#FF6F61", "F54927", "#ED9811", "#F7CAC9",
        "#92A8D1", "#955251", "#B565A7", "#009B77",
        "#DD4124", "#45B8AC", "#EFC050", "#5B5EA6"];
    for (let i = 0; i < 12; i++) {
        let randomcolors = colors[Math.floor(Math.random() * 12)];
        b.innerHTML += `<div class="box" style="background:${randomcolors}"></div>`;
    }
</script>

</html>
