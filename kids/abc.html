<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: cursive;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #ffd6d6, #fff0e6);
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            flex-direction: column;
            text-align: center;
        }

        .container>h2 {
            font-size: 40px;
            color: rgb(237, 48, 15);
            letter-spacing: 2px;
        }

        .container>p {
            margin-top: 10px;
            color: rgb(236, 107, 1);
            font-size: 20px;
        }

        .boxes {
            display: flex;
            flex-wrap: wrap;
            width: 500px;
            margin: auto;
            margin-top: 30px;
            gap: 15px;
            justify-content: center;
        }

        .box {
            width: 100px;
            height: 100px;
            line-height: 100px;
            text-align: center;
            font-size: 2rem;
            outline: 1px solid black;
            outline-offset: -10px;
            cursor: pointer;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
            font-weight: bold;
        }

        .box:hover {
            font-size: 2.5rem;
            transform: scale(1.1);

        }

        .goback {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background: #ff7043;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .goback:hover {
            background: #ff5722;
            transform: scale(1.05);
        }

        @media (max-width:768px) {
            .container {
                text-align: center;
                padding: 0 10px;
            }

            .container>h2 {
                font-size: 30px;
                line-height: 1.2;
                margin-bottom: 5px;
            }

            .container p {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>“📘 Learn Alphabets”</h2>
        <p>“Tap on any letter to learn”</p>
        <div class="boxes"></div>
        <a href="home.html" class="goback">Go-Back</a>
    </div>
</body>
<script>
    let b = document.querySelector('.boxes');
    let colors = ["#FFCDD2", "#F8BBD0", "#E1BEE7",
        "#D1C4E9", "#C5CAE9", "#BBDEFB",
        "#B2EBF2", "#C8E6C9", "#DCEDC8",
        "#FFF9C4", "#FFE0B2", "#FFCCBC"];
    for (let i = 65; i <= 90; i++) {
        let randomcolors = colors[Math.floor(Math.random() * 12)];
        b.innerHTML += `<div class="box" style="background:${randomcolors}">${String.fromCharCode(i)}</div>`
    }
</script>

</html>
