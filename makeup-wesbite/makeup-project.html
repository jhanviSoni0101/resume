<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            min-width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url(makeup-Image01.jpg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }

        .layout {
            text-align: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 60px;
            font-weight: 600;
        }

        .logo span:first-child {
            color: #f42d6f;
        }

        .logo span:last-child {
            color: #ffffff;
        }

        .tag {
            margin-top: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            color: #f42d6f;
            transition: 0.3s;
        }
        .tag:hover{
            color: #ff4d88;
            transform: scale(1.08);
        }
       a{
        margin-top: 10px;
        display: inline-block;
        text-decoration: none;
        background: #fff;
        padding: 10px 30px;
        border-radius: 30px;
        border-top-right-radius: 0;
        color: #f42d6f;
        font-family:'Poppins', sans-serif;
        transition: 0.3s;
       }
    a:hover{
        background-color:#f42d6f;
color: #ffffff;
    }
    </style>
</head>

<body>
    <div class="layout">
        <div class="content">
            <h1 class="logo">
                <span>Glow</span>
                <span>in</span>
            </h1>
        </div>
        <div class="tag">Glow Like Never Before.</div>
        <a href="makeup-homepage.html">Let's Glow</a>
    </div>
</body>

</html>
