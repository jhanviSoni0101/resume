<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: cursive;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            background-image: linear-gradient(45deg, rgb(249, 249, 147), rgb(180, 114, 234));
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .calender {
            width: 300px;
            height: 250px;
            background-color: white;
            display: flex;
            align-items: center;
            border-radius: 10px;
        }

        .left,
        .right {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-direction: column;
        }

        .right {
            width: 42%;
            background: rgb(112, 25, 158);
            color: yellow;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .left {
            width: 58%;
        }

        #date {
            font-size: 100px;
            line-height: 90px;
        }

        #msgs {
            font-size: 18px;
            color: rgb(126, 34, 140);
            text-align: center;
            max-width: 300px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="calender">
            <div class="left">
                <p id="date">01</p>
                <p id="day">Sunday</p>
            </div>
            <div class="right">
                <p id="month">January</p>
                <p id="year">2026</p>
            </div>
        </div>
      
    </div>
</body>
<script>
    let date = document.getElementById('date');
    let day = document.getElementById('day');
    let month = document.getElementById('month');
    let year = document.getElementById('year');
    let weekdays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thrusday", "Friday", "Saturday"];
    let allmonths = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    
    let today = new Date();
    console.log(today);
    date.innerHTML = (today.getDate() < 10 ? "0" : "") + today.getDate();
    day.innerHTML = weekdays[today.getDay()];
    month.innerHTML = allmonths[today.getMonth()];
    year.innerHTML = today.getFullYear();
</script>

</html>
